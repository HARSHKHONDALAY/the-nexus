# Production configuration for AWS Lightsail deployment
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:./.env[.properties],optional:file:../.env[.properties]
  application:
    name: the-nexus-backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:900000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:20000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION:30000}
      pool-name: NexusHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
        connection:
          provider_disables_autocommit: true
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        batch_size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    out-of-order: false
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

# Production security configuration
nexus:
  security:
    jwt-secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
    auth-rate-limit-per-minute: ${AUTH_RATE_LIMIT:10}
    admin-mutation-rate-limit-per-minute: ${ADMIN_RATE_LIMIT:30}
    booking-rate-limit-per-minute: ${BOOKING_RATE_LIMIT:10}
  payments:
    razorpay-key-id: ${RAZORPAY_KEY_ID:}
    razorpay-key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
    currency: ${PAYMENT_CURRENCY:INR}
  storage:
    s3-bucket: ${AWS_S3_BUCKET:}
    s3-region: ${AWS_S3_REGION:ap-south-1}

# Production logging
logging:
  level:
    com.thenexus: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/nexus-backend/application.log
    max-size: 50MB
    max-history: 7

# Management endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: false
    java:
      enabled: true
    os:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/
  application:
    name: the-nexus-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/the_nexus}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:15}
      minimum-idle: ${DB_POOL_MIN_IDLE:3}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:900000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:20000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION:30000}
      pool-name: NexusHikariPool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    baseline-on-migrate: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

nexus:
  security:
    jwt-secret: ${JWT_SECRET:thenexus-local-development-secret-key-2026-secure-long-enough-for-validation}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  payments:
    razorpay-key-id: ${RAZORPAY_KEY_ID:}
    razorpay-key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
    currency: ${PAYMENT_CURRENCY:INR}
  storage:
    s3-bucket: ${AWS_S3_BUCKET:}
    s3-region: ${AWS_REGION:ap-south-1}
    public-base-url: ${MEDIA_PUBLIC_BASE_URL:}
    max-upload-bytes: ${MEDIA_MAX_UPLOAD_BYTES:10485760}
  mail:
    from-email: ${MAIL_FROM_EMAIL}
    from-name: ${MAIL_FROM_NAME:The Nexus}

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /v3/api-docs

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

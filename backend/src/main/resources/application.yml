server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:./.env[.properties],optional:file:../.env[.properties]
  application:
    name: the-nexus-backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

nexus:
  security:
    jwt-secret: ${JWT_SECRET:thenexus-local-development-secret-key-2026-secure}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  payments:
    razorpay-key-id: ${RAZORPAY_KEY_ID:}
    razorpay-key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
    currency: ${PAYMENT_CURRENCY:INR}
  storage:
    s3-bucket: ${AWS_S3_BUCKET:}
    s3-region: ${AWS_REGION:ap-south-1}
    public-base-url: ${MEDIA_PUBLIC_BASE_URL:}
    max-upload-bytes: ${MEDIA_MAX_UPLOAD_BYTES:10485760}
  mail:
    from-email: ${MAIL_FROM_EMAIL}
    from-name: ${MAIL_FROM_NAME:The Nexus}

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /v3/api-docs

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
